<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spot the Fake Photo — demo</title>
<style>
  :root { --bg:#0f1115; --card:#1a1d24; --ink:#e8eaed; --muted:#9aa0a6;
          --real:#34a853; --screen:#ea4335; --line:#2b2f37; }
  * { box-sizing: border-box; }
  body { margin:0; font:16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
         background:var(--bg); color:var(--ink); display:flex; justify-content:center; }
  main { width:min(720px, 94vw); padding:28px 0 60px; }
  h1 { font-size:1.4rem; margin:.2em 0; }
  p.sub { color:var(--muted); margin-top:0; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px;
          padding:18px; margin-top:18px; }
  video, #shot { width:100%; border-radius:10px; background:#000; display:block; }
  #shot { display:none; }
  .row { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
  button, label.btn { background:#2a6df4; color:#fff; border:none; border-radius:9px;
          padding:11px 16px; font-size:1rem; cursor:pointer; }
  button.ghost, label.btn.ghost { background:transparent; border:1px solid var(--line); color:var(--ink); }
  button:disabled { opacity:.5; cursor:default; }
  input[type=file] { display:none; }
  .verdict { text-align:center; padding:10px 0; }
  .label { font-size:1.5rem; font-weight:700; letter-spacing:.3px; }
  .score { color:var(--muted); font-variant-numeric:tabular-nums; }
  .meter { height:14px; border-radius:8px; margin:14px 0 6px;
           background:linear-gradient(90deg, var(--real), #d8b400 50%, var(--screen)); position:relative; }
  .needle { position:absolute; top:-5px; width:3px; height:24px; background:#fff;
            border-radius:2px; transform:translateX(-50%); transition:left .25s ease; }
  .ends { display:flex; justify-content:space-between; color:var(--muted); font-size:.82rem; }
  .hint { color:var(--muted); font-size:.85rem; margin-top:10px; }
  .err { color:var(--screen); }
</style>
</head>
<body>
<main>
  <h1>Spot the Fake Photo</h1>
  <p class="sub">Real photo vs. photo <em>of a screen</em>. Score is P(photo-of-a-screen), 0&ndash;1.</p>

  <div class="card">
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="shot"></canvas>
    <div class="row">
      <button id="capture">📸 Capture from camera</button>
      <label class="btn ghost" for="file">🖼️ Upload a photo</label>
      <input id="file" type="file" accept="image/*">
      <button id="retry" class="ghost" style="display:none">↺ Live again</button>
    </div>
    <p class="hint">Tip: a <b>phone photo</b> of a screen works best — webcams are low-resolution,
       so moiré (the key signal) is weaker. Point at a monitor vs. a real object to compare.</p>
  </div>

  <div class="card verdict">
    <div class="label" id="label">—</div>
    <div class="meter"><div class="needle" id="needle" style="left:50%"></div></div>
    <div class="ends"><span>0 · real</span><span>screen · 1</span></div>
    <div class="score" id="score">awaiting an image…</div>
  </div>
</main>

<script>
const cam = document.getElementById('cam');
const shot = document.getElementById('shot');
const labelEl = document.getElementById('label');
const scoreEl = document.getElementById('score');
const needle = document.getElementById('needle');
const btnCap = document.getElementById('capture');
const btnRetry = document.getElementById('retry');

// Ask for the highest resolution the camera offers (more detail = better moiré).
navigator.mediaDevices?.getUserMedia({ video: { width:{ideal:1920}, height:{ideal:1080} } })
  .then(s => cam.srcObject = s)
  .catch(() => { cam.style.display='none'; btnCap.disabled = true;
                 scoreEl.textContent = 'No camera — use “Upload a photo”.'; });

function showResult(score) {
  const pct = Math.round(score * 100);
  needle.style.left = pct + '%';
  const isScreen = score >= 0.5;
  labelEl.textContent = isScreen ? 'PHOTO OF A SCREEN' : 'REAL PHOTO';
  labelEl.style.color = isScreen ? 'var(--screen)' : 'var(--real)';
  scoreEl.textContent = `score = ${score.toFixed(3)}  (${pct}% likely a screen)`;
}

async function send(blob) {
  scoreEl.textContent = 'analyzing…';
  labelEl.textContent = '…';
  try {
    const r = await fetch('/predict', { method:'POST', headers:{'Content-Type':'image/jpeg'}, body:blob });
    const j = await r.json();
    if (j.error) throw new Error(j.error);
    showResult(j.score);
  } catch (e) {
    labelEl.textContent = 'error';
    scoreEl.textContent = e.message;
    scoreEl.classList.add('err');
    return;
  }
  scoreEl.classList.remove('err');
}

btnCap.onclick = () => {
  shot.width = cam.videoWidth; shot.height = cam.videoHeight;
  shot.getContext('2d').drawImage(cam, 0, 0);
  cam.style.display='none'; shot.style.display='block'; btnRetry.style.display='inline-block';
  shot.toBlob(b => send(b), 'image/jpeg', 0.95);
};
btnRetry.onclick = () => { shot.style.display='none'; cam.style.display='block'; btnRetry.style.display='none'; };

document.getElementById('file').onchange = e => {
  const f = e.target.files[0];
  if (f) { cam.style.display='none'; shot.style.display='none'; btnRetry.style.display='inline-block'; send(f); }
};
</script>
</body>
</html>
